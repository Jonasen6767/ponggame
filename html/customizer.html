<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customizer</title>
    <link rel="stylesheet" href="../css/customiser.css">
</head>
<body>
    <main class="side">
        <section class="topp">
            <h1>VELG SKIN</h1>
            <p>Her kan dere velge hvordan racketene og ballen skal se ut i Pong.</p>
        </section>

        <form class="valg">
            <input type="radio" name="skin" id="skin-standard" checked>
            <label class="skin-kort" for="skin-standard">
                <span class="skin-navn">Standard</span>
                <span class="preview preview-standard">
                    <span class="racket venstre"></span>
                    <span class="ball"></span>
                    <span class="racket hoyre"></span>
                </span>
                <span class="skin-info">Vanlig hvit stil.</span>
            </label>

            <input type="radio" name="skin" id="skin-neon">
            <label class="skin-kort" for="skin-neon">
                <span class="skin-navn">Neon</span>
                <span class="preview preview-neon">
                    <span class="racket venstre"></span>
                    <span class="ball"></span>
                    <span class="racket hoyre"></span>
                </span>
                <span class="skin-info">Sterke farger og klar kontrast.</span>
            </label>

            <input type="radio" name="skin" id="skin-ice">
            <label class="skin-kort" for="skin-ice">
                <span class="skin-navn">Ice</span>
                <span class="preview preview-ice">
                    <span class="racket venstre"></span>
                    <span class="ball"></span>
                    <span class="racket hoyre"></span>
                </span>
                <span class="skin-info">Lys blaa og kald look.</span>
            </label>

            <input type="radio" name="skin" id="skin-lava">
            <label class="skin-kort" for="skin-lava">
                <span class="skin-navn">Lava</span>
                <span class="preview preview-lava">
                    <span class="racket venstre"></span>
                    <span class="ball"></span>
                    <span class="racket hoyre"></span>
                </span>
                <span class="skin-info">Roed og oransje stil.</span>
            </label>

            <input type="radio" name="skin" id="skin-forest">
            <label class="skin-kort" for="skin-forest">
                <span class="skin-navn">Forest</span>
                <span class="preview preview-forest">
                    <span class="racket venstre"></span>
                    <span class="ball"></span>
                    <span class="racket hoyre"></span>
                </span>
                <span class="skin-info">Mork groenn og naturfarger.</span>
            </label>

            <input type="radio" name="skin" id="skin-shadow">
            <label class="skin-kort" for="skin-shadow">
                <span class="skin-navn">Shadow</span>
                <span class="preview preview-shadow">
                    <span class="racket venstre"></span>
                    <span class="ball"></span>
                    <span class="racket hoyre"></span>
                </span>
                <span class="skin-info">Morkere stil med lys ball.</span>
            </label>
        </form>

        <section class="nede">
            <p>Det valgte skinet kan kobles inn i selve spillet senere.</p>
            <a class="tilbake" href="../index.html">TILBAKE TIL MENY</a>
        </section>
    </main>
</body>
</html>
